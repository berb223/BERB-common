name: Publish

# Build wheel + sdist on tag push and attach them to the matching
# GitHub Release. Delegates to the reusable workflow in BERB-workflows
# so every Python repo in the FTNT/BERB portfolio publishes the same
# way.
#
# Trigger: push of a `v*` tag. The reusable workflow will create the
# Release if it doesn't already exist, generate notes from commit
# history, and upload `dist/*.whl` + `dist/*.tar.gz` as assets.
#
# To release: bump `project.version` in pyproject.toml, update
# CHANGELOG.md, merge the bump PR, then `git tag v0.1.4 && git push
# origin v0.1.4`. The workflow's `verify-version-matches-tag` guard
# fails the build if the tag and the pyproject version disagree.

on:
  push:
    tags: ["v*"]

# The reusable workflow needs `contents: write` to create the Release
# and upload the wheel + sdist. Caller must grant it explicitly here —
# permissions in the called workflow can only narrow what the caller
# already allows.
permissions:
  contents: write

jobs:
  publish:
    uses: berb223/BERB-workflows/.github/workflows/python-publish.yml@v1
    with:
      python-version: "3.12"
